<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800;900&family=Noto+Serif+TC:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <title>你在股市是那一種角色？</title>
  <style>

    :root{
      --bg:#12090b;
      --panel:#1b1013;
      --panel-2:#241317;
      --text:#fff6ea;
      --muted:#c0aaa3;
      --line:rgba(255,220,180,.13);
      --orange:#a51f27;
      --orange-2:#d59a52;
      --orange-soft:rgba(165,31,39,.14);
      --cream:#fff2df;
      --shadow:0 24px 70px rgba(0,0,0,.42);
      --radius:26px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      font-family:"Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 18% 0%, rgba(126,18,28,.24), transparent 32%),
        radial-gradient(circle at 82% 10%, rgba(213,154,82,.10), transparent 30%),
        linear-gradient(180deg,#12090b 0%,#0d0809 100%);
    }

    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.22;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size:42px 42px;
      mask-image:linear-gradient(to bottom,black,transparent 88%);
    }

    .wrap{
      width:min(900px, calc(100% - 28px));
      margin:0 auto;
      padding:42px 0 64px;
      position:relative;
      z-index:1;
    }

    .hero{
      text-align:center;
      margin-bottom:28px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:8px 14px;
      border:1px solid rgba(213,154,82,.42);
      border-radius:999px;
      background:rgba(126,18,28,.18);
      color:#e8b875;
      font-size:13px;
      font-weight:800;
      letter-spacing:.08em;
      margin-bottom:18px;
    }

    h1{
      margin:0;
      font-size:clamp(42px,7vw,72px);
      line-height:1.04;
      letter-spacing:-.055em;
      color:var(--cream);
      text-shadow:0 8px 30px rgba(0,0,0,.48);
    }

    .hero p{
      color:var(--muted);
      margin:18px auto 0;
      max-width:680px;
      line-height:1.8;
      font-size:17px;
    }

    .card{
      position:relative;
      background:
        linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.008)),
        var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:32px;
      overflow:hidden;
      backdrop-filter:blur(16px);
    }

    .card:before{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      border-radius:50%;
      background:rgba(126,18,28,.20);
      top:-85px;
      right:-70px;
      filter:blur(12px);
    }

    .progress-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:12px;
      font-size:14px;
      color:var(--muted);
      font-weight:700;
    }

    .progress{
      height:9px;
      background:#0b0c0f;
      border:1px solid var(--line);
      border-radius:999px;
      overflow:hidden;
      margin-bottom:30px;
    }

    .progress > span{
      display:block;
      height:100%;
      width:10%;
      background:linear-gradient(90deg,#8f1821,#d59a52);
      border-radius:999px;
      transition:width .25s ease;
      box-shadow:0 0 18px rgba(143,24,33,.28);
    }

    .question{
      font-size:clamp(25px,4vw,33px);
      line-height:1.45;
      margin:0 0 24px;
      letter-spacing:-.025em;
    }

    .answers{
      display:grid;
      gap:12px;
    }

    .answer{
      border:1px solid var(--line);
      background:var(--panel-2);
      border-radius:16px;
      padding:18px 19px;
      font-size:16px;
      line-height:1.65;
      text-align:left;
      cursor:pointer;
      transition:.18s ease;
      color:var(--text);
      box-shadow:none;
    }

    .answer:hover{
      border-color:rgba(213,154,82,.52);
      background:#2a171b;
      transform:translateY(-2px);
    }

    .answer.selected{
      border-color:#d59a52;
      background:rgba(126,18,28,.20);
      box-shadow:0 0 0 3px rgba(213,154,82,.10);
    }

    .controls{
      display:flex;
      gap:12px;
      justify-content:space-between;
      margin-top:28px;
    }

    button{font:inherit}

    .btn{
      border:0;
      border-radius:14px;
      padding:13px 20px;
      cursor:pointer;
      font-weight:850;
      transition:.18s ease;
    }

    .btn-secondary{
      background:#24272d;
      color:#e7e1db;
      border:1px solid var(--line);
    }

    .btn-primary{
      background:linear-gradient(135deg,#8f1821,#b52b31);
      color:#fff;
      margin-left:auto;
      box-shadow:0 10px 24px rgba(90,8,15,.34);
    }

    .btn:disabled{
      opacity:.35;
      cursor:not-allowed;
      box-shadow:none;
    }

    .btn:not(:disabled):hover{
      transform:translateY(-2px);
    }

    .hidden{display:none !important}

    .start{
      text-align:center;
      padding:48px 32px;
    }
.start h2,.result h2{
      font-size:clamp(30px,5vw,44px);
      margin:0 0 14px;
      letter-spacing:-.035em;
    }

    .start p{
      color:var(--muted);
      line-height:1.8;
      margin:0 auto 28px;
      max-width:580px;
    }

    .result{
      text-align:center;
    }
.result-desc{
      color:var(--muted);
      max-width:660px;
      margin:0 auto 26px;
      line-height:1.85;
      font-size:16px;
    }

    .section{
      text-align:left;
      background:#111318;
      border:1px solid var(--line);
      padding:20px;
      border-radius:18px;
      margin-top:18px;
    }

    .section h3{
      margin:0 0 12px;
      font-size:18px;
    }

    .tags{
      display:flex;
      flex-wrap:wrap;
      gap:9px;
    }

    .tag{
      padding:9px 12px;
      border-radius:999px;
      background:rgba(126,18,28,.18);
      border:1px solid rgba(213,154,82,.28);
      font-size:14px;
      font-weight:750;
      color:#e7ba7d;
    }

    .recommend-title{
      display:flex;
      align-items:end;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .recommend-title h3{margin:0;font-size:21px}
    .recommend-title span{font-size:13px;color:var(--muted)}

    .course-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
      margin-top:14px;
      text-align:left;
    }

    .course-card{
      position:relative;
      background:#171a20;
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-width:0;
      transition:.18s ease;
      box-shadow:none;
    }

    .course-card:hover{
      transform:translateY(-4px);
      border-color:rgba(213,154,82,.42);
    }

    .course-cover{
      width:78%;
      aspect-ratio:1/1;
      object-fit:cover;
      background:#eef1f5;
      display:block;
      margin:18px auto 0;
      border-radius:14px;
      filter:saturate(.94) contrast(1.03);
    }

    .course-body{
      padding:20px;
      display:flex;
      flex-direction:column;
      flex:1;
      min-height:250px;
    }

    .course-title{
      font-weight:850;
      line-height:1.45;
      font-size:16px;
      margin:0 0 8px;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .course-desc{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
      display:-webkit-box;
      -webkit-line-clamp:5;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .course-categories{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-bottom:10px;
    }

    .course-category{
      font-size:12px;
      font-weight:750;
      color:#e7ba7d;
      background:rgba(126,18,28,.18);
      padding:5px 8px;
      border-radius:999px;
      border:1px solid rgba(255,106,0,.22);
    }

    .course-link{
      margin-top:auto;
      padding-top:14px;
      color:#fff;
      background:linear-gradient(135deg,#8f1821,#b52b31);
      border-radius:11px;
      display:block;
      padding:11px 12px;
      text-align:center;
      text-decoration:none;
      font-size:14px;
      font-weight:600;
      border:0;
      box-shadow:none;
    }
h1,
    .start h2,
    .result h2,
    .question{
      font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
      font-weight:600;
    }

    h1{
      letter-spacing:-.035em;
    }

    .question{
      letter-spacing:-.015em;
    }

    .result h2{
      line-height:1.35;
    }


    body.curtain-lock{
      overflow:hidden;
    }

    .curtain-intro{
      position:fixed;
      inset:0;
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:#0d0708;
      transition:opacity .45s ease, visibility .45s ease;
    }

    .curtain-intro.opened{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .curtain-panel{
      position:absolute;
      top:0;
      bottom:0;
      width:52%;
      z-index:2;
      background:
        repeating-linear-gradient(
          90deg,
          #3d070d 0,
          #5a0d15 7%,
          #2a0509 14%,
          #67101a 21%,
          #35070b 28%
        );
      box-shadow:inset 0 0 80px rgba(0,0,0,.55);
      transition:transform 1.15s cubic-bezier(.7,0,.2,1);
    }

    .curtain-panel:after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg,rgba(255,255,255,.07),transparent 20%,rgba(0,0,0,.18) 65%,transparent);
      mix-blend-mode:screen;
      opacity:.55;
    }

    .curtain-left{
      left:0;
      border-right:2px solid rgba(214,178,118,.38);
      transform-origin:left center;
    }

    .curtain-right{
      right:0;
      border-left:2px solid rgba(214,178,118,.38);
      transform-origin:right center;
    }

    .curtain-intro.opening .curtain-left{
      transform:translateX(-102%);
    }

    .curtain-intro.opening .curtain-right{
      transform:translateX(102%);
    }

    .curtain-top{
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:84px;
      z-index:4;
      background:
        radial-gradient(ellipse at 8% 0%,#641019 0 32%,transparent 34%),
        radial-gradient(ellipse at 24% 0%,#461018 0 32%,transparent 34%),
        radial-gradient(ellipse at 40% 0%,#641019 0 32%,transparent 34%),
        radial-gradient(ellipse at 56% 0%,#461018 0 32%,transparent 34%),
        radial-gradient(ellipse at 72% 0%,#641019 0 32%,transparent 34%),
        radial-gradient(ellipse at 88% 0%,#461018 0 32%,transparent 34%),
        linear-gradient(#561019,#2b070b);
      border-bottom:2px solid rgba(214,178,118,.42);
      box-shadow:0 8px 30px rgba(0,0,0,.45);
    }

    .curtain-center{
      position:relative;
      z-index:5;
      width:min(820px, calc(100% - 32px));
      text-align:center;
      padding:34px 28px 32px;
      border:1px solid rgba(212,180,131,.28);
      border-radius:28px;
      background:rgba(19,10,12,.72);
      backdrop-filter:blur(8px);
      box-shadow:0 26px 80px rgba(0,0,0,.45);
      transition:opacity .35s ease, transform .35s ease;
    }

    .curtain-intro.opening .curtain-center{
      opacity:0;
      transform:scale(.97);
    }

    .curtain-seal{
      width:72px;
      height:72px;
      margin:0 auto 18px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:50%;
      border:1px solid rgba(255,212,151,.55);
      background:
        radial-gradient(circle at 35% 25%,#ffcf86,#c9822f 55%,#7c4315);
      color:#2b1208;
      font-size:20px;
      font-weight:900;
      letter-spacing:.12em;
      box-shadow:0 0 36px rgba(255,153,51,.22);
    }

    .curtain-kicker{
      margin-bottom:12px;
      color:#d8b27a;
      font-size:13px;
      font-weight:800;
      letter-spacing:.22em;
    }


    .curtain-kicker-only{
      margin-top:4px;
      margin-bottom:16px;
      font-size:18px;
    }

    .curtain-title{
      margin:0;
      font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
      font-size:clamp(38px,7vw,68px);
      line-height:1.15;
      letter-spacing:-.04em;
      color:#f6ead9;
      text-shadow:0 8px 28px rgba(0,0,0,.5);
    }

    .curtain-copy{
      margin:18px auto 0;
      color:#d3c0b1;
      font-size:16px;
      line-height:1.8;
    }
    @media (max-width:640px){
      .curtain-center{
        width:calc(100% - 20px);
        padding-left:12px;
        padding-right:12px;
      }

      .curtain-title{
        font-size:clamp(27px, 8vw, 40px);
        white-space:nowrap;
      }
    }

    .curtain-btn{
      margin-top:26px;
      border:1px solid rgba(212,180,131,.45);
      border-radius:999px;
      padding:13px 22px;
      cursor:pointer;
      background:linear-gradient(135deg,#7a1620,#4b0b12);
      color:#f6ead9;
      font-size:15px;
      font-weight:850;
      letter-spacing:.06em;
      box-shadow:0 12px 32px rgba(0,0,0,.32);
      transition:.18s ease;
    }

    .curtain-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 38px rgba(0,0,0,.4);
      border-color:#d8b27a;
    }


    .hero:before{
      content:"CONFIDENTIAL ASSESSMENT";
      display:block;
      margin-bottom:10px;
      color:rgba(213,154,82,.58);
      font-size:11px;
      font-weight:800;
      letter-spacing:.22em;
    }

    .card{
      outline:1px solid rgba(213,154,82,.05);
      outline-offset:-8px;
    }

    .card:after{
      content:"";
      position:absolute;
      inset:12px;
      pointer-events:none;
      border:1px solid rgba(213,154,82,.06);
      border-radius:18px;
    }
.section{
      background:
        linear-gradient(180deg,rgba(126,18,28,.07),transparent),
        #140d0f;
    }

    @media (max-width:600px){
      .curtain-top{height:64px}
      .curtain-center{
        padding:28px 20px 26px;
      }
      .curtain-seal{
        width:62px;
        height:62px;
        font-size:17px;
      }
      .curtain-copy{
        font-size:15px;
      }
    }

    @media (max-width:600px){
      .wrap{width:min(100% - 18px,900px);padding-top:22px}
      .card{padding:21px}
      .question{font-size:22px}
      .course-grid{grid-template-columns:1fr}
      .controls{gap:8px}
      .btn{padding:12px 14px}
.recommend-title{align-items:flex-start;flex-direction:column}
}

  
/* Readability refinement */
.question-title,
.option-btn,
.option-text {
  font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
}

.option-btn {
  font-weight: 600;
  line-height: 1.65;
  letter-spacing: 0.01em;
}

.question-title {
  font-weight: 700;
  line-height: 1.45;
}


/* Tarot result card */
.result-tarot-wrap{
  display:flex;
  justify-content:center;
  margin:0 auto 22px;
}
.result-tarot-image{
  width:min(100%, 300px);
  aspect-ratio:2 / 3;
  object-fit:cover;
  border-radius:18px;
  border:1px solid rgba(213,154,82,.52);
  box-shadow:0 22px 48px rgba(0,0,0,.42);
  background:#18130d;
}
@media (max-width:640px){
  .result-tarot-image{width:min(100%, 250px);}
}


/* Result page typography refinement */
#resultTitle{
  font-weight:600;
  line-height:1.4;
}

#resultDesc{
  display:block;
  max-width:660px;
  margin:0 auto 26px;
  color:var(--muted);
  font-size:16px;
  font-weight:400;
  line-height:1.85;
  opacity:1;
  visibility:visible;
}

#resultScreen h3{
  font-weight:600;
}

#resultScreen .tag{
  font-weight:500;
}

#resultScreen .course-title{
  font-weight:600;
}

#resultScreen .course-desc{
  font-weight:400;
}

#resultScreen .course-link,
#resultScreen > .btn{
  font-weight:400;
  letter-spacing:.02em;
}


/* Result action buttons */
.result-actions{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:22px;
}

.result-actions .btn{
  margin-left:0;
  font-weight:400;
}

/* Hidden 9:16 social sharing card: 1080 × 1920 */
.download-result-card{
  position:fixed;
  left:-99999px;
  top:0;
  width:1080px;
  height:1920px;
  padding:108px 76px 90px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  color:#fff6ea;
  background:
    radial-gradient(circle at 18% 0%, rgba(126,18,28,.32), transparent 34%),
    radial-gradient(circle at 84% 8%, rgba(213,154,82,.13), transparent 30%),
    linear-gradient(180deg,#1b0e11 0%,#10090b 100%);
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  overflow:hidden;
}

.download-result-card::before{
  content:"";
  position:absolute;
  inset:24px;
  border:2px solid rgba(213,154,82,.28);
  border-radius:34px;
  pointer-events:none;
}

.download-kicker{
  position:relative;
  margin-bottom:18px;
  color:#d8b27a;
  font-size:28px;
  font-weight:500;
  letter-spacing:.18em;
}

.download-result-heading{
  position:relative;
  width:100%;
  margin:0 auto 24px;
  text-align:center;
}

.download-result-label{
  margin-bottom:8px;
  color:#d8b27a;
  font-size:30px;
  font-weight:600;
  letter-spacing:.12em;
}

#downloadResultTitle{
  margin:0;
  font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
  color:#fff2df;
  font-size:66px;
  font-weight:700;
  line-height:1.18;
}

#downloadResultDesc{
  position:relative;
  width:920px;
  margin:0 auto 34px;
  color:#cbb8b0;
  font-size:28px;
  font-weight:400;
  line-height:1.65;
}

.download-result-image{
  position:relative;
  display:block;
  width:560px;
  height:840px;
  margin:0 auto;
  object-fit:cover;
  border:2px solid rgba(213,154,82,.55);
  border-radius:22px;
  box-shadow:0 24px 60px rgba(0,0,0,.48);
  -webkit-user-drag:none;
  user-select:none;
}


.download-solution-wrap{
  position:relative;
  width:760px;
  margin:34px auto 0;
  padding:22px 26px;
  border-radius:24px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(213,154,82,.18);
}

.download-solution-title{
  margin-bottom:10px;
  color:#d8b27a;
  font-size:30px;
  font-weight:700;
  letter-spacing:.08em;
}

.download-result-solution{
  width:fit-content;
  max-width:100%;
  margin:0 auto;
  padding-left:30px;
  color:#eadfd3;
  font-size:26px;
  font-weight:400;
  line-height:1.7;
  text-align:left;
  list-style-position:outside;
}

.download-result-solution li{
  margin:8px 0;
  padding-left:6px;
}

.download-result-solution li::marker{
  color:#d8b27a;
}

.download-footer{
  position:relative;
  margin-top:auto;
  padding-top:34px;
  color:#d8b27a;
  font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
  font-size:28px;
  letter-spacing:.06em;
}

@media (max-width:600px){
  .result-actions{
    flex-direction:column;
  }

  .result-actions .btn{
    width:100%;
  }
}


/* Result page solution */
.result-solution-section{
  width:min(100%, 660px);
  margin:0 auto 22px;
  padding:20px 24px;
  text-align:center;
  border:1px solid rgba(213,154,82,.22);
  border-radius:18px;
  background:
    linear-gradient(180deg,rgba(126,18,28,.08),transparent),
    #140d0f;
}

.result-solution-section h3{
  margin:0 0 12px;
  color:#e7ba7d;
  font-size:18px;
  font-weight:600;
  text-align:center;
}

.result-solution-list{
  width:fit-content;

    "solution2": "固定檢視原始投資假設是否失效",
    "solution3": "避免只蒐集支持自己持股的資訊"
  },
  "DE": {
    "solution1": "強制設定停損",
    "solution2": "限制單筆最大虧損與每日交易上限",
    "solution3": "先保住本金，再追求刺激與報酬"
  }
};

function getSolutionItems(code){
  const row = solutionRows[code] || {
    solution1:"建立清楚的投資邏輯",
    solution2:"設定風險邊界",
    solution3:"逐步形成適合自己的方法"
  };

  return [row.solution1, row.solution2, row.solution3].filter(Boolean);
}


let current = 0;
let answers = Array(questions.length).fill(null);
let runtimeQuestions = [];

function shuffledCopy(items){
  const copy = [...items];
  for(let i = copy.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function prepareQuestions(){
  runtimeQuestions = questions.map(question => ({
    ...question,
    options: shuffledCopy(question.options)
  }));
}


function escapeHtml(value){
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
function escapeAttribute(value){ return escapeHtml(value); }


function openCurtain(){
  const intro = document.getElementById("curtainIntro");
  intro.classList.add("opening");
  document.body.classList.remove("curtain-lock");

  prepareQuestions();
  current = 0;
  answers = Array(questions.length).fill(null);
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  renderQuestion();

  setTimeout(()=>{
    intro.classList.add("opened");
  }, 1150);
}

function startQuiz(){
  prepareQuestions();
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  renderQuestion();
}
function renderQuestion(){
  const q = runtimeQuestions[current];
  document.getElementById("counter").textContent = `第 ${current+1} 題，共 ${questions.length} 題`;
  const pct = Math.round(((current+1)/questions.length)*100);
  document.getElementById("percent").textContent = pct + "%";
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("questionText").textContent = q.q;

  const box = document.getElementById("answers");
  box.innerHTML = "";
  q.options.forEach((opt, idx)=>{
    const btn = document.createElement("button");
    btn.className = "answer" + (answers[current] === idx ? " selected" : "");
    btn.textContent = opt.t;
    btn.onclick = ()=>selectAnswer(idx);
    box.appendChild(btn);
  });

  document.getElementById("prevBtn").disabled = current === 0;
  document.getElementById("nextBtn").disabled = answers[current] === null;
  document.getElementById("nextBtn").textContent = current === questions.length-1 ? "看結果" : "下一題";
}
function selectAnswer(idx){
  answers[current] = idx;
  renderQuestion();
}
function prevQuestion(){
  if(current>0){ current--; renderQuestion(); }
}
function nextQuestion(){
  if(answers[current] === null) return;
  if(current < questions.length-1){
    current++;
    renderQuestion();
  } else {
    showResult();
  }
}
function calculate(){
  const ps = {A:0,B:0,C:0,D:0,E:0};
  const tags = {};
  answers.forEach((ans, i)=>{
    const opt = runtimeQuestions[i].options[ans];
    ps[opt.p] += 2;
    opt.tags.forEach((tag, idx)=>{
      tags[tag] = (tags[tag] || 0) + (idx===0 ? 2 : 1);
    });
  });
  return {ps,tags};
}

const resultTarotImages = {
  "股市迷路小幼苗": "assets/sprout.png",
  "佛系資產飼養員": "assets/keeper.png",
  "財報考古研究員": "assets/archivist.png",
  "盤面反射神經戰士": "assets/reactor.png",
  "市場狙擊手": "assets/hunter.png",
  "熱血梭哈玩家": "assets/gambler.png",
  "攤平哲學信仰者": "assets/believer.png",
  "永不退場戰士": "assets/believer.png"
};

function showResult(){
  const {ps,tags} = calculate();
  const ranked = Object.entries(ps).sort((a,b)=>b[1]-a[1]);
  const first = ranked[0], second = ranked[1];
  let title, desc, resultCode;

  if(first[1] - second[1] <= 2){
    resultCode = [first[0],second[0]].sort().join("");
    title = mixedNames[resultCode] || `${personas[first[0]].name} × ${personas[second[0]].name}`;
    desc = mixedDescs[resultCode] || `你同時帶有「${personas[first[0]].name}」和「${personas[second[0]].name}」的特質。`;
  }else{
    resultCode = first[0];
    title = personas[first[0]].name;
    desc = personas[first[0]].desc;
  }

  const solution = getSolutionItems(resultCode);

  let courseRank = Object.entries(tags).sort((a,b)=>b[1]-a[1]);

  // 新手與賭狗保護：避免直接把高風險工具排在最前面
  if(first[0] === "A" || first[0] === "E"){
    const risky = ["當沖","期貨選擇權"];
    courseRank = courseRank.sort((a,b)=>{
      const ar = risky.includes(a[0]) ? 1 : 0;
      const br = risky.includes(b[0]) ? 1 : 0;
      if(ar !== br) return ar-br;
      return b[1]-a[1];
    });
  }

  const topCourses = courseRank.slice(0,4);

  // 依分類分數計算每個專欄的符合程度
  let recommended = courses
    .map((course, index) => {
      const matched = course.categories
        .map(category => ({category, score: tags[category] || 0}))
        .filter(item => item.score > 0)
        .sort((a,b) => b.score - a.score);
      let score = matched.reduce((sum, item, idx) => sum + item.score * (idx === 0 ? 2 : 1), 0);

      // 高風險傾向仍優先導向技術、籌碼與盤勢判讀
      if(first[0] === "E"){
        if(course.categories.includes("技術分析")) score += 5;
        if(course.categories.includes("籌碼分析")) score += 4;
        if(course.categories.includes("盤勢分析")) score += 3;
        if(course.categories.includes("當沖")) score -= 3;
        if(course.categories.includes("期貨選擇權")) score -= 5;
      }

      return {...course, score, matched, index};
    })
    .sort((a,b) => b.score - a.score || b.matched.length - a.matched.length || a.index - b.index)
    .slice(0,4);

  if(recommended.length === 0){
    recommended = courses.slice(0,4).map((course, index) => ({
      ...course,
      score: 0,
      matched: [],
      index
    }));
  }

  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");
  document.getElementById("resultTitle").textContent = `鑑定結果：${title}`;
  document.getElementById("resultDesc").textContent = desc;

  const imageUrl = resultTarotImages[title] || "assets/sprout.png";

  const tarotImage = document.getElementById("resultTarotImage");
  tarotImage.src = imageUrl;
  tarotImage.alt = `${title}塔羅牌`;

  document.getElementById("downloadResultTitle").textContent = title;
  document.getElementById("downloadResultDesc").textContent = desc;
  const resultSolutionList = document.getElementById("resultSolutionList");
  const downloadSolutionList = document.getElementById("downloadResultSolution");

  resultSolutionList.innerHTML = "";
  downloadSolutionList.innerHTML = "";

  solution.forEach(item => {
    const resultLi = document.createElement("li");
    resultLi.textContent = item;
    resultSolutionList.appendChild(resultLi);

    const downloadLi = document.createElement("li");
    downloadLi.textContent = item;
    downloadSolutionList.appendChild(downloadLi);
  });

  const downloadImage = document.getElementById("downloadResultImage");
  downloadImage.src = imageUrl;
  downloadImage.alt = `${title}塔羅牌`;

  const tagBox = document.getElementById("courseTags");
  tagBox.innerHTML = "";
  topCourses.forEach(([name])=>{
    const span = document.createElement("span");
    span.className = "tag";
    span.textContent = name;
    tagBox.appendChild(span);
  });

  const courseBox = document.getElementById("courseGrid");
  courseBox.innerHTML = "";
  if(!recommended.length){
    courseBox.innerHTML = '<p class="result-desc">目前沒有符合的推薦專案，請重新測驗。</p>';
  }
  recommended.forEach(course => {
    const card = document.createElement("article");
    card.className = "course-card";

    const labels = course.categories
      .map(category => `<span class="course-category">${escapeHtml(category)}</span>`)
      .join("");

    card.innerHTML = `
<img class="course-cover" src="${escapeAttribute(course.image)}" alt="${escapeAttribute(course.title)}封面"
           onerror="this.onerror=null;this.src='data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22600%22 height=%22600%22%3E%3Crect width=%22100%25%22 height=%22100%25%22 fill=%22%23eef1f5%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23667085%22 font-size=%2230%22%3E專欄封面%3C/text%3E%3C/svg%3E'">
      <div class="course-body">
        <div class="course-categories">${labels}</div>
        <h4 class="course-title">${escapeHtml(course.title)}</h4>
        <p class="course-desc">${escapeHtml(course.description)}</p>
        <a class="course-link" href="${escapeAttribute(course.url)}" target="_blank" rel="noopener noreferrer">去看看能不能救</a>
      </div>`;
    courseBox.appendChild(card);
  });
}

async function waitForImage(image){
  if(image.complete && image.naturalWidth > 0) return;

  await new Promise((resolve, reject) => {
    image.addEventListener("load", resolve, {once:true});
    image.addEventListener("error", reject, {once:true});
  });
}

async function downloadResultImage(event){
  const button = event.currentTarget;
  const originalText = button.textContent;

  button.disabled = true;
  button.textContent = "圖片產製中…";

  try{
    const card = document.getElementById("downloadResultCard");
    const image = document.getElementById("downloadResultImage");

    await waitForImage(image);

    if(document.fonts && document.fonts.ready){
      await document.fonts.ready;
    }

    const canvas = await html2canvas(card, {
      backgroundColor:null,
      scale:1,
      useCORS:true,
      allowTaint:false,
      logging:false,
      width:1080,
      height:1920,
      windowWidth:1080,
      windowHeight:1920
    });

    const title = document
      .getElementById("resultTitle")
      .textContent
      .replace("鑑定結果：", "")
      .trim();

    const link = document.createElement("a");
    link.download = `PPA投資行為鑑定結果_${title}.png`;
    link.href = canvas.toDataURL("image/png", 1);
    document.body.appendChild(link);
    link.click();
    link.remove();
  }catch(error){
    console.error("下載鑑定結果失敗：", error);
    alert("圖片產製失敗，請重新整理後再試一次。");
  }finally{
    button.disabled = false;
    button.textContent = originalText;
  }
}

function restartQuiz(){
  current = 0;
  answers = Array(questions.length).fill(null);
  prepareQuestions();
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  renderQuestion();
  window.scrollTo({top:0, behavior:"smooth"});
}
